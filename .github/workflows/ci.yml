name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Workspace integrity check (manypkg)
        run: yarn check

      - name: Check formatting (oxfmt)
        run: yarn format:check

      - name: Lint (oxlint)
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Compile
        run: yarn compile

      - name: Test
        run: yarn test

  release:
    name: Release
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Must match the environment name configured on npmjs.com as a Trusted Publisher.
    environment: main

    permissions:
      contents: write # push version-bump commits and create GitHub Releases
      pull-requests: write # open and update the Version Packages PR
      id-token: write # obtain OIDC token for npm Trusted Publishers

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ISO_SAFETY_SIGNS_APP_ID }}
          private-key: ${{ secrets.ISO_SAFETY_SIGNS_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so changesets can compare package versions across tags.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Compile packages
        run: yarn compile

      - name: Create Version PR or Publish to npm
        uses: changesets/action@v1
        with:
          # Yarn Berry's `yarn npm publish` uses its own HTTP client and does not
          # invoke npm CLI, so it cannot pick up the OIDC token automatically.
          # This script uses `npm publish` directly, which handles the OIDC token
          # exchange with the npm registry natively (npm CLI v9+).
          publish: bash scripts/publish.sh
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Format generated changelogs
        run: |
          yarn format
          git diff --quiet || git commit -am "chore: format generated changelogs"
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
